name: hcdp-api

networks:
  hcdp-net:
    driver: bridge

services:
  api:
    init: true
    build:
      context: .
    restart: on-failure
    container_name: api
    ports:
      - "8080:8080"
    volumes:
      - /mnt/lustre/annotated/HCDP:/data
      - /home/hcdp/hcdp-api/logs:/logs
    profiles: [ prod ]
    healthcheck:
      test: "curl -f https://localhost:8080/health || exit 1"
      interval: 1m
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hcdp-net
  api-dev:
    init: true
    build:
      context: .
    restart: on-failure
    container_name: api-dev
    ports:
      - "8081:8080"
    volumes:
      - /mnt/lustre/annotated/HCDP:/data
      - /home/hcdp/hcdp-api/logs:/logs
    profiles: [ dev ]
    healthcheck:
      test: "curl -f https://localhost:8080/health || exit 1"
      interval: 1m
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hcdp-net
  postgres:
    init: true
    image: postgres:17
    container_name: api-db
    env_file: db.env
    volumes:
      - /media/volume/HCDP-API-ManagementDB/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hcdp-net